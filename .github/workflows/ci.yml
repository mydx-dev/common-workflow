name: CI

on:
    workflow_call:

permissions:
    contents: read
    packages: read

jobs:
    ci:
        if: ${{ contains(fromJSON('["mydx-dev","taiga-automate-growth"]'), github.repository_owner) }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "24"

            - run: corepack enable

            - run: corepack prepare pnpm@9.12.3 --activate

            - run: pnpm --version

            - name: Configure npm auth
              run: |
                  echo "//npm.pkg.github.com/:_authToken=${NPM_TOKEN}" > .npmrc
                  echo "@mydx-dev:registry=https://npm.pkg.github.com" >> .npmrc
              env:
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

            - run: pnpm install

            - name: Lint (if config exists)
              run: |
                  if [ -f eslint.config.mjs ]; then pnpm exec eslint .; fi

            - name: Test (if config exists)
              run: |
                  if [ -f vitest.config.js ]; then pnpm exec vitest --run; fi
