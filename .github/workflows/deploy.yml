name: Deploy

on:
    workflow_call:
        inputs:
            environment:
                description: "Deploy environment"
                required: true
                type: string
            ref:
                description: "Git ref to deploy"
                required: false
                type: string
            comment:
                description: "Post deployment comment to PR"
                required: false
                type: boolean
                default: true
            clasp_json_secret:
                description: "Secret name for clasp config JSON"
                required: true
                type: string

permissions:
    contents: read
    packages: read
    pull-requests: write
    issues: write
    actions: write

jobs:
    deploy:
        if: ${{ contains(fromJSON('["mydx-dev","taiga-automate-growth"]'), github.repository_owner) }}
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}
        env:
            DEPLOY_ID: ${{ vars.DEPLOY_ID }}
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.ref || github.sha }}

            - uses: actions/setup-node@v4
              with:
                  node-version: "24"

            - run: corepack enable

            - run: corepack prepare pnpm@9.12.3 --activate

            - run: pnpm --version

            - name: Configure npm auth
              run: |
                  echo "//npm.pkg.github.com/:_authToken=${NPM_TOKEN}" > .npmrc
                  echo "@mydx-dev:registry=https://npm.pkg.github.com" >> .npmrc
              env:
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

            - run: pnpm install

            - name: Write clasp credentials
              run: |
                  printf '%s' "$CLASP_CREDENTIALS" > ~/.clasprc.json
                  chmod 600 ~/.clasprc.json
              env:
                  CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}

            - name: Write clasp config
              run: |
                  mkdir -p config
                  printf '%s' "$CLASP_JSON" > config/.clasp.${ENVIRONMENT}.json
              env:
                  ENVIRONMENT: ${{ inputs.environment }}
                  CLASP_JSON: ${{ secrets[inputs.clasp_json_secret] }}

            - name: Push to GAS
              run: pnpm exec gas-boost push ${{ inputs.environment }}

            - name: Deploy to GAS
              id: deploy
              run: |
                  pnpm exec gas-boost deploy ${{ inputs.environment }} | tee deploy.log
                  URL=$(grep -Eo 'WEB_APP_URL=\S+' deploy.log | tail -n1 | cut -d= -f2-)
                  DEPLOY_ID=$(grep -Eo 'DEPLOY_ID=\S+' deploy.log | tail -n1 | cut -d= -f2-)
                  if [ -z "$DEPLOY_ID" ]; then
                    DEPLOY_ID=$(grep -Eo 'New deploymentId: \S+' deploy.log | tail -n1 | awk '{print $3}')
                  fi
                  echo "web_app_url=$URL" >> $GITHUB_OUTPUT
                  echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT

            - name: Persist deploy ID
              if: ${{ steps.deploy.outputs.deploy_id != '' && vars.DEPLOY_ID == '' }}
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GAS_BOOST_PAT }}
                  script: |
                      const { owner, repo } = context.repo;
                      await github.request(
                        'PUT /repos/{owner}/{repo}/environments/{environment_name}/variables/{name}',
                        {
                          owner,
                          repo,
                          environment_name: process.env.ENV_NAME,
                          name: 'DEPLOY_ID',
                          value: process.env.DEPLOY_ID,
                        },
                      );
              env:
                  ENV_NAME: ${{ inputs.environment }}
                  DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}

            - name: Detect PR number
              id: pr
              if: ${{ inputs.comment }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const eventName = context.eventName;
                      let prNumber = null;
                      if (eventName === 'workflow_run') {
                        const prs = context.payload.workflow_run.pull_requests || [];
                        if (prs.length) prNumber = prs[0].number;
                      } else if (eventName === 'push') {
                        const { owner, repo } = context.repo;
                        const res = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                          owner,
                          repo,
                          commit_sha: context.sha,
                        });
                        if (res.data.length) prNumber = res.data[0].number;
                      }
                      core.setOutput('number', prNumber || '');

            - name: Build comment
              id: comment
              if: ${{ inputs.comment && steps.pr.outputs.number != '' }}
              run: |
                  if [ -n "${{ steps.deploy.outputs.web_app_url }}" ]; then
                    echo "body=**${{ inputs.environment }}** deploy: ${{ steps.deploy.outputs.web_app_url }}" >> $GITHUB_OUTPUT
                  else
                    echo "body=**${{ inputs.environment }}** deploy completed (URL not found)" >> $GITHUB_OUTPUT
                  fi

            - name: Print deploy URL
              if: ${{ steps.pr.outputs.number == '' }}
              run: |
                  if [ -n "${{ steps.deploy.outputs.web_app_url }}" ]; then
                    echo "${{ inputs.environment }} deploy: ${{ steps.deploy.outputs.web_app_url }}"
                  else
                    echo "${{ inputs.environment }} deploy completed (URL not found)"
                  fi

            - name: Comment on PR
              if: ${{ inputs.comment && steps.pr.outputs.number != '' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
                      const issue_number = Number(process.env.PR_NUMBER || '0');
                      if (!issue_number) {
                        core.info('PR number not found. Skipping comment.');
                        return;
                      }
                      const body = process.env.COMMENT_BODY || '';
                      if (!body) {
                        core.info('Comment body is empty. Skipping comment.');
                        return;
                      }
                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number,
                        body,
                      });
              env:
                  PR_NUMBER: ${{ steps.pr.outputs.number }}
                  COMMENT_BODY: ${{ steps.comment.outputs.body }}
